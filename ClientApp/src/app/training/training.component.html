<form>
    
    <div class="form-group">
        What type of training do you prefer?
        <div class="form-check">
            <input class="form-check-input" type="radio" id="pushpull" name="radioTraining">
            <label class="form-check-label" for="training">Push / Pull</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="FBW" name="radioTraining" checked>
            <label class="form-check-label" for="training">FBW</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="split" name="radioTraining">
            <label class="form-check-label" for="split">Split</label>
        </div>     
        
    </div>
    
    <div class="form-group">
        What's your aim ?
        <div class="form-check">
            <input class="form-check-input" type="radio" id="strength" name="radioAim">
            <label class="form-check-label" for="strength">Strength</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="stamina" name="radioAim">
            <label class="form-check-label" for="stamina">Stamina</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="overall" name="radioAim">
            <label class="form-check-label" for="overall">Overall</label>
        </div>
    </div>
    <div class="form-group">
        What's your experience ?
        <div class="form-check">
            <input class="form-check-input" type="radio" id="beginner" name="radioExp" (click)="experienceCalculate('beginner')">
            <label class="form-check-label" for="beginner">Beginner</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="intermediate" name="radioExp" (click)="experienceCalculate('intermediate')">
            <label class="form-check-label" for="intermediate">Intermediate</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" id="professional" name="radioExp" (click)="experienceCalculate('professional')">
            <label class="form-check-label" for="professional">Professional</label>
        </div>
    </div>
    <div *ngIf="isExperienceSelected">
    <div class="form-group">
        In what days you want to train ?
        <div *ngFor="let no of noOfTrainingDaysCounter; let i = index">
            <div class="input-group-prepend">
                <label class="input-group-text" for="daysDropDown">Training {{i+1}}</label>
            </div> 
            <select class="custom-select" id="daysDropDown">
                <option *ngFor = "let dayOfWeek of daysOfWeek">{{dayOfWeek}}</option>
            </select>
        </div>

        <small class="form-text text-muted">Based on your experience you should train {{noOfTrainingDays}} days</small>
    </div>
</div>

<button class="btn btn-primary" type="submit">Generate new training  plan!</button>
</form>
