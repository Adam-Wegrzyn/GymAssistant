<form>
    <div class="form-group col-md-4">
        <label class="font-weight-bold" for="name">Name</label>
        <input class="form-control" id="name">
    </div>
    
    <div class="form-group col-md-4">
        <label class="font-weight-bold">Muscle group</label>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="backCheckbox" value="back">
            <label class="form-check-label" for="backCheckbox">Back</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="shouldersCheckbox" value="shoulders">
            <label class="form-check-label" for="shouldersCheckbox">Shoulders</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="chestCheckbox" value="chest">
            <label class="form-check-label" for="chestCheckbox">Chest</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="bicepsCheckbox" value="biceps">
            <label class="form-check-label" for="bicepsCheckbox">Biceps</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="tricepsCheckbox" value="triceps">
            <label class="form-check-label" for="tricepsCheckbox">Triceps</label>
        </div>
    </div>

    <button class="btn btn-primary">Add</button>

</form>
